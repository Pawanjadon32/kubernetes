apiVersion: apps/v1
kind: Deployment
metadata:
  name: useless
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: useless
  template:
    metadata:
      labels:
        app: useless
    spec:
      containers:
        - name: useless
          image: pawanjadon/myapp:latest
          ports:
            - containerPort: 80
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: useless-v2
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: useless-v2
  template:
    metadata:
      labels:
        app: useless-v2
    spec:
      containers:
        - name: useless-v2
          image: pawanjadon/myapp:latest
          ports:
            - containerPort: 80
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
