apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: kabir
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
spec:
  rules:
  - host: kabirpratap.sbs
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: useless-svc
            port:
              number: 80
      - path: /v2
        pathType: Prefix
        backend:
          service:
            name: useless-v2-svc
            port:
              number: 80
