# Deployment for app1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app1.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app1.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app1.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app1.name }}
    spec:
      containers:
        - name: {{ .Values.app1.name }}
          image: "{{ .Values.app1.image.repository }}:{{ .Values.app1.image.tag }}"
          ports:
            - containerPort: {{ .Values.app1.port }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.app1.strategy.maxSurge }}
      maxUnavailable: {{ .Values.app1.strategy.maxUnavailable }}
