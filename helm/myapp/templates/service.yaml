# Service for app1
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app1.service.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.app1.name }}
  ports:
    - port: {{ .Values.app1.service.port }}
      targetPort: {{ .Values.app1.port }}
  type: {{ .Values.app1.service.type }}
---
# Service for app2
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app2.service.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.app2.name }}
  ports:
    - port: {{ .Values.app2.service.port }}
      targetPort: {{ .Values.app2.port }}
  type: {{ .Values.app2.service.type }}
